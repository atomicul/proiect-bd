<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Monopoly{% endblock %}</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 48rem; padding: 0 1rem; color: #222; }
        h1, h2 { line-height: 1.2; }
        a { color: #0645ad; }
        table { border-collapse: collapse; width: 100%; margin: 0.5rem 0 1.5rem; }
        th, td { border: 1px solid #ddd; padding: 0.4rem 0.6rem; text-align: left; }
        th { background: #f4f4f4; }
        .player { border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin: 1rem 0; }
        .muted { color: #777; }
        .swatch { display: inline-block; width: 0.8rem; height: 0.8rem; border: 1px solid #999; vertical-align: middle; margin-right: 0.3rem; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
