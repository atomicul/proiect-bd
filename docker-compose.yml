services:
  oracle:
    image: ghcr.io/atomicul/proiect-bd:latest
    ports:
      - "1521:1521"
    environment:
      APP_USER: ${APP_USER:-monopoly}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:?APP_USER_PASSWORD must be set in .env}
      ORACLE_DATABASE: ${ORACLE_DATABASE:-monopoly}

  web:
    image: ghcr.io/atomicul/proiect-bd/web:latest
    ports:
      - "8080:8080"
    environment:
      APP_USER: ${APP_USER:-monopoly}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:?APP_USER_PASSWORD must be set in .env}
      ORACLE_DATABASE: ${ORACLE_DATABASE:-monopoly}
      DB_HOST: oracle
    depends_on:
      oracle:
        condition: service_healthy
